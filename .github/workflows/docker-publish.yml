name: Publish Docker Images

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # Run tests before publishing (reuse the test logic from django-ci.yml)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file for backend
        env:
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD || 'dummy-password-for-ci' }}
          EXCHANGE_API_KEY_PRIMARY: ${{ secrets.EXCHANGE_API_KEY_PRIMARY || 'dummy-exchange-api-key-for-ci' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'dummy-client-id-for-ci' }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || 'dummy-client-secret-for-ci' }}
        run: |
          mkdir -p backend/imhotep_finance
          cat > backend/imhotep_finance/.env << EOF
          database_type=postgresql
          DATABASE_HOST=db
          DATABASE_PORT=5432
          DATABASE_NAME=imhotep_finance_test_db
          DATABASE_USER=imhotep_finance_test_user
          DATABASE_PASSWORD=test_password_for_ci

          FIELD_ENCRYPTION_KEY='n92mf1YPKUSezl_LUII9EJWWVy3TnI3JuxlgFuakv_0='

          SECRET_KEY=ci-test-secret-key-for-github-actions-only
          DEBUG=1
          ALLOWED_HOSTS=localhost,127.0.0.1,backend

          SITE_DOMAIN=http://localhost:8000
          frontend_url=http://localhost:3000

          CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000

          EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
          EMAIL_HOST=smtp.gmail.com
          EMAIL_PORT=587
          EMAIL_USE_TLS=True
          EMAIL_HOST_USER=ci-test@example.com
          MAIL_USER=ci-test@example.com
          MAIL_PASSWORD=${MAIL_PASSWORD}

          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          GOOGLE_REDIRECT_URI=http://localhost:8000/api/auth/google/callback/

          JWT_SECRET=ci-test-jwt-secret-for-github-actions

          EXCHANGE_API_KEY_PRIMARY=${EXCHANGE_API_KEY_PRIMARY}
          EOF

      - name: Build and start services
        env:
          POSTGRES_DB: imhotep_finance_test_db
          POSTGRES_USER: imhotep_finance_test_user
          POSTGRES_PASSWORD: test_password_for_ci
        run: |
          docker compose up -d --build --wait db backend || true

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend service..."
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            container_status=$(docker compose ps backend --format "{{.Status}}" 2>/dev/null || echo "not-found")
            if [ "$container_status" != "not-found" ] && echo "$container_status" | grep -qE "(healthy|running)"; then
              echo "✅ Backend is running"
              break
            fi
            echo "  Waiting... ($attempt/$max_attempts) — $container_status"
            attempt=$((attempt + 1))
            sleep 2
          done

      - name: Wait for database to be ready
        env:
          POSTGRES_DB: imhotep_finance_test_db
          POSTGRES_USER: imhotep_finance_test_user
          POSTGRES_PASSWORD: test_password_for_ci
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" > /dev/null 2>&1; then
              echo "✅ Database is ready"
              break
            fi
            echo "  Waiting for database... ($i/30)"
            sleep 2
          done

      - name: Run migrations
        run: docker compose exec -T backend python manage.py migrate --noinput

      - name: Run all Django tests
        run: docker compose exec -T backend python manage.py test --verbosity=2

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # Build and push Docker images after tests pass
  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "${{ github.event_name }}" = "release" ]; then
            # On release: tag with version + latest
            BACKEND_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/imhotep_finance_backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/imhotep_finance_backend:${{ github.event.release.tag_name }}"
            FRONTEND_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/imhotep_finance_frontend:latest,${{ secrets.DOCKERHUB_USERNAME }}/imhotep_finance_frontend:${{ github.event.release.tag_name }}"
          else
            # On push to main: tag with latest + commit SHA
            BACKEND_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/imhotep_finance_backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/imhotep_finance_backend:main-${SHORT_SHA}"
            FRONTEND_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/imhotep_finance_frontend:latest,${{ secrets.DOCKERHUB_USERNAME }}/imhotep_finance_frontend:main-${SHORT_SHA}"
          fi

          echo "backend_tags=$BACKEND_TAGS" >> "$GITHUB_OUTPUT"
          echo "frontend_tags=$FRONTEND_TAGS" >> "$GITHUB_OUTPUT"
          echo "Backend tags: $BACKEND_TAGS"
          echo "Frontend tags: $FRONTEND_TAGS"

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/imhotep_finance
          file: ./frontend/imhotep_finance/Dockerfile.prod
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max