services:
  db:
    image: postgres:15-alpine
    container_name: imhotep_finance_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imhotep_finance_db}
      POSTGRES_USER: ${POSTGRES_USER:-imhotep_finance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imhotep_finance_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imhotep_finance_user} -d ${POSTGRES_DB:-imhotep_finance_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: kbassem10/imhotep_finance_backend:latest
    container_name: imhotep_finance_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import http.client; conn = http.client.HTTPConnection(\"localhost\", 8000); conn.request(\"GET\", \"/api/health/\"); res = conn.getresponse(); exit(0) if res.status in [200, 301, 302, 404] else exit(1)'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: kbassem10/imhotep_finance_frontend:latest
    container_name: imhotep_finance_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: